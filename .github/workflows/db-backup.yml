name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          /usr/lib/postgresql/18/bin/pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          mkdir -p backups
          FILENAME="backups/backup_$(date +'%Y-%m-%d_%H-%M').sql"
          /usr/lib/postgresql/18/bin/pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            > "$FILENAME"
          echo "✅ Backup saved: $FILENAME"
          echo "📦 Size: $(du -sh $FILENAME | cut -f1)"

      - name: Keep only last 30 backups
        run: |
          cd backups
          COUNT=$(ls *.sql 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 30 ]; then
            ls -t *.sql | tail -n +31 | xargs rm --
          fi
          echo "🗂️ Backups kept: $(ls *.sql 2>/dev/null | wc -l)"

      - name: Commit and push backup
        run: |
          git config user.name  "Backup Bot"
          git config user.email "backup@linkspace.app"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +'%Y-%m-%d %H:%M') auto backup"
          git push
