name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:18-alpine

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          mkdir -p backups
          FILENAME="backups/backup_$(date +'%Y-%m-%d_%H-%M').sql"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            > "$FILENAME"
          echo "✅ Backup saved: $FILENAME"
          echo "📦 Size: $(du -sh $FILENAME | cut -f1)"

      - name: Keep only last 30 backups
        run: |
          cd backups
          ls -t *.sql | tail -n +31 | xargs -r rm --
          echo "🗂️ Backups kept: $(ls *.sql | wc -l)"

      - name: Commit and push backup
        run: |
          git config user.name  "Backup Bot"
          git config user.email "backup@linkspace.app"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +'%Y-%m-%d %H:%M') auto backup"
          git push
